<!-- header.html - drop-in replacement, no overlap issues -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  :root {
    --ink: #0d0d1a;
    --paper: #f5f3ee;
    --accent: #e84a27;
    --mid: #6b6b7b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .os-nav {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: var(--paper);
    border-bottom: 2px solid var(--ink);
    font-family: 'Syne', sans-serif;
  }

  .os-nav__inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 2rem;
  }

  .os-nav__logo {
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .os-nav__logo span {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 0.7rem;
  }

  .os-nav__links {
    list-style: none;
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  .os-nav__links a {
    display: block;
    padding: 0.35rem 0.85rem;
    color: var(--ink);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }

  .os-nav__links a:hover,
  .os-nav__links a.active {
    background: var(--ink);
    color: var(--paper);
  }

  .os-nav__links a.active {
    background: var(--accent);
  }

  .os-nav__toggle {
    display: none;
    background: none;
    border: 2px solid var(--ink);
    border-radius: 4px;
    width: 38px;
    height: 38px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    color: var(--ink);
    flex-shrink: 0;
  }

  @media (max-width: 700px) {
    .os-nav__toggle { display: flex; }

    .os-nav__links {
      display: none;
      position: absolute;
      top: 64px;
      left: 0;
      right: 0;
      background: var(--paper);
      border-bottom: 2px solid var(--ink);
      flex-direction: column;
      align-items: stretch;
      padding: 0.75rem 1.5rem 1rem;
      gap: 0.15rem;
    }

    .os-nav__links.open { display: flex; }
    .os-nav__links a { padding: 0.6rem 0.5rem; }
  }
</style>

<nav class="os-nav">
  <div class="os-nav__inner">
    <a class="os-nav__logo" href="/OSWebsite/index.html">
      <i class="bi bi-hdd-stack-fill"></i>
      ITOS220-T <span>OS</span>
    </a>

    <button class="os-nav__toggle" id="navToggle" aria-label="Toggle navigation">
      <i class="bi bi-list"></i>
    </button>

    <ul class="os-nav__links" id="navLinks">
      <li><a href="/OSWebsite/index.html">Home</a></li>
      <li><a href="/OSWebsite/pages/history.html">History</a></li>
      <li><a href="/OSWebsite/pages/types.html">Types</a></li>
      <li><a href="/OSWebsite/pages/functions.html">Functions</a></li>
      <li><a href="/OSWebsite/pages/about.html">About</a></li>
    </ul>
  </div>
</nav>

<script>
  (function () {
    var toggle = document.getElementById('navToggle');
    var links = document.getElementById('navLinks');
    if (toggle && links) {
      toggle.addEventListener('click', function () {
        links.classList.toggle('open');
      });
    }
    var cur = window.location.pathname;
    links && links.querySelectorAll('a').forEach(function (a) {
      if (a.getAttribute('href') && cur.endsWith(a.getAttribute('href').split('/').pop())) {
        a.classList.add('active');
      }
    });
  })();
</script>
