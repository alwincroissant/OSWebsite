<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITOS220-T: About</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>
    <div id="header"></div>

    <main class="mx-auto">
        <div class="text-center mb-4">
            <h2 class="display-6 fw-bold">About This Project</h2>
            <p class="lead" style="text-align: justify;">
                ITOS220-T: Operating Systems is an academic project website that documents laboratory activities,

            </p>
        </div>
    </main>

    <div id="footer"></div>

    <script>
        fetch('/OSWebsite/layouts/header.html').then(r => r.text()).then(h => document.getElementById('header').innerHTML = h);
        fetch('/OSWebsite/layouts/footer.html').then(r => r.text()).then(f => document.getElementById('footer').innerHTML = f);
    </script>
</body>

</html>
